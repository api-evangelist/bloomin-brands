aid: bloomin-brands
name: Bloomin' Brands
description: >-
  Bloomin' Brands, Inc. (NASDAQ: BLMN) is one of the largest casual dining
  restaurant companies in the world, headquartered in Tampa, Florida and founded
  in 1988. It owns and operates four restaurant concepts — Outback Steakhouse,
  Carrabba's Italian Grill, Bonefish Grill, and Fleming's Prime Steakhouse & Wine
  Bar — across the United States and internationally (Brazil, South Korea, Hong
  Kong, and China). The company's consumer technology centers on the Web-based
  Dine Rewards loyalty program, per-brand mobile apps (iOS/Android) for online
  ordering, curbside takeaway, delivery, table payment, reservations, and
  waitlist, and corporate supplier portals (BBI Connect). Bloomin' Brands does
  not currently publish a public developer API, SDKs, or a developer portal; the
  apis collection below is intentionally empty.
