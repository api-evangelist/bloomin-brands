aid: bloomin-brands
name: Bloomin' Brands
description: >-
  Bloomin' Brands is one of the largest casual dining restaurant companies in the
  world, operating Outback Steakhouse, Carrabba's Italian Grill, Bonefish Grill, and
  Fleming's Prime Steakhouse & Wine Bar. The company focuses on hospitality technology
  including loyalty programs, online ordering, and restaurant management systems,
  though public developer APIs are not currently available.
